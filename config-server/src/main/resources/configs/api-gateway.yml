server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**, /api/auth/**
        - id: trip-service
          uri: lb://trip-service
          predicates:
            - Path=/api/trips/**
        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings/**
        - id: negotiation-service
          uri: lb://negotiation-service
          predicates:
            - Path=/api/negotiations/**
        - id: messaging-service
          uri: lb://messaging-service
          predicates:
            - Path=/api/messages/**, /ws/**
        - id: rating-service
          uri: lb://rating-service
          predicates:
            - Path=/api/ratings/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true